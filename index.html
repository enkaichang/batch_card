<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatchCard - 批次社群卡片產生器</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Gen AI SDK -->
  <script type="module">
    import { GoogleGenAI, setDefaultBaseUrls } from 'https://esm.sh/@google/genai';
    window.GoogleGenAI = GoogleGenAI;
    window.setDefaultBaseUrls = setDefaultBaseUrls;

  <style>
    :root {
      --Primary: #81B2D1;
      --Secondary: #94a3b8;
      --Background: #0f172a;
      --Text: #f1f5f9;
      --Text-Muted: #94a3b8;
      --Accent: #1e293b;
      --Card-Bg: #1e293b;
      --Card-Border: rgba(255, 255, 255, 0.05);
      --Input-Border: #334155;
      --on-primary: #0f172a;
      --Scrollbar-Track: #0f172a;
      --Scrollbar-Thumb: #475569;
      --Primary-10: rgba(129, 178, 209, 0.10);
      --Primary-20: rgba(129, 178, 209, 0.20);
      --Primary-30: rgba(129, 178, 209, 0.30);
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--Background);
      color: var(--Text);
    }
    .font-serif-tc {
      font-family: 'Noto Serif TC', serif;
    }
    /* 隱藏滾動條但保持滾動 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Custom scrollbar for other scrollable areas */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--Scrollbar-Track);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--Scrollbar-Thumb);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--Secondary);
    }

    /* ==================== AI Streaming Animations ==================== */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(16px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 8px 0px rgba(129, 178, 209, 0.3), inset 0 0 0 1px rgba(129, 178, 209, 0.4); }
      50% { box-shadow: 0 0 20px 4px rgba(129, 178, 209, 0.5), inset 0 0 0 1px rgba(129, 178, 209, 0.7); }
    }
    @keyframes typingCursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .ai-writing {
      animation: glowPulse 1.8s ease-in-out infinite;
      border-color: var(--Primary) !important;
    }
    .ai-card-enter {
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .ai-shimmer-overlay {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: 50;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(129, 178, 209, 0.06) 25%,
        rgba(129, 178, 209, 0.15) 50%,
        rgba(129, 178, 209, 0.06) 75%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }
    .ai-typing-cursor::after {
      content: '▍';
      color: var(--Primary);
      font-weight: 300;
      animation: typingCursor 0.8s step-end infinite;
      margin-left: 1px;
    }
    .ai-stream-progress {
      position: relative;
      overflow: hidden;
    }
    .ai-stream-progress::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--Primary), transparent);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
    }
    .ai-sparkle {
      display: inline-block;
      animation: sparkle 1.2s ease-in-out infinite;
    }

    /* ==================== Card ==================== */
    .card {
      background: var(--Card-Bg);
      border-radius: 24px;
      overflow: visible;
      transition: all 0.3s ease-out;
      border: 1px solid var(--Card-Border);
      padding: 1.5rem;
    }
    .card:hover {
      border-color: var(--Primary);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .card-lg {
      padding: 2rem;
      border-radius: 32px;
    }

    /* ==================== Buttons ==================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      border: none;
      gap: 0.5rem;
    }
    .btn-primary {
      background-color: var(--Primary);
      border: 1px solid var(--Primary);
      color: var(--on-primary);
      padding: 0.75rem 2rem;
      border-radius: 999px;
      transition: all 0.3s ease;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover {
      background-color: rgba(129, 178, 209, 0);
      color: var(--Primary);
    }
    .btn-secondary {
      border: 1px solid var(--Secondary);
      background-color: var(--Secondary);
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      font-weight: 600;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background-color: rgba(129, 178, 209, 0);
      color: var(--Secondary);
    }
    .btn-red {
      background-color: #E74C3C;
      border: 1px solid #E74C3C;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 999px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-red:hover {
      background-color: rgba(129, 178, 209, 0);
      color: #E74C3C;
    }
    .btn-sm {
      padding: 0.375rem 1rem !important;
      font-size: 0.75rem !important;
    }

    /* ==================== Form Styles ==================== */
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--Primary);
      opacity: 0.7;
      margin-bottom: 0.5rem;
      padding-left: 0.25rem;
    }
    .form-input {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      border: 1px solid var(--Input-Border);
      border-radius: 12px;
      background-color: transparent;
      color: var(--Text);
      transition: all 0.2s ease;
    }
    .form-input:focus {
      border-color: var(--Primary);
      box-shadow: 0 0 0 3px rgba(129, 178, 209, 0.1);
      outline: none;
    }
    .form-input-sm {
      padding: 0.5rem 0.75rem !important;
      font-size: 0.875rem !important;
      border-radius: 8px !important;
    }
  </style>
</head>

    function App() {

      useEffect(() => {
        // 從 query string 或 hash fragment 解析參數
        const searchParams = new URLSearchParams(window.location.search);
        
        let hashString = window.location.hash || '';
        if (hashString.startsWith('#?')) {
          hashString = hashString.substring(2);
        } else if (hashString.startsWith('#')) {
          hashString = hashString.substring(1);
        }
        const hashParams = new URLSearchParams(hashString);

            const standardModels = ['gemini-3.5-flash', 'gemini-2.5-flash', 'gemini-3.1-flash-lite'];
            if (standardModels.includes(modelParam)) {

              localStorage.setItem('gemini_model', modelParam);
              activeModel = modelParam;
            } else {
              setSelectedModel('custom');
              setCustomModel(modelParam);
              localStorage.setItem('gemini_model', 'custom');
              localStorage.setItem('gemini_custom_model', modelParam);
              activeModel = modelParam;
            }
          }

          // 處理可選的 API Key 設定
          const apiKeyParam = getParam('apiKey') || getParam('api_key');
          if (apiKeyParam) {
            setApiKey(apiKeyParam);
            localStorage.setItem('gemini_api_key', apiKeyParam);
          }

          // 處理可選的生成模式設定
          const genModeParam = getParam('genMode') || getParam('mode');
          if (genModeParam && (genModeParam === 'replace' || genModeParam === 'append')) {
            setGenMode(genModeParam);
          }

          // 清理 URL 查詢參數與 hash，避免重新整理時重複觸發
          const newUrl = window.location.pathname;
          window.history.replaceState({}, document.title, newUrl);

          // 取得最終有效的 API Key（傳入的或原本已儲存的）
          const activeKey = apiKeyParam || localStorage.getItem('gemini_api_key') || '';

          // 檢查是否需要自動生成
          const autogenParam = getParam('auto') || getParam('auto_generate') || getParam('autogen');
          const shouldAutogen = autogenParam === 'true' || autogenParam === '1';

          if (shouldAutogen) {
            if (activeKey.trim()) {
              // 延遲以確保 React 狀態就緒，並傳入解析後的參數避免閉包舊值問題
              setTimeout(() => {
                handleAiGenerate(articleParam, {
                  count: effectiveCount,
                  apiKey: activeKey,
                  model: activeModel,
                  genMode: genModeParam || 'replace'
                });
              }, 150);
            } else {
              alert('已成功匯入文章！由於尚未設定 Gemini API Key，請先於設定區輸入密鑰以開始生成卡片。');
              setShowApiSettings(true);
            }
          } else {
            alert('已成功從外部網頁匯入文章內容！您可以調整設定後點選「開始 AI 智慧生成」。');
          }
        }
      }, []);

      const activeCard = cards.find(c => c.id === activeCardId) || cards[0] || {};

      const isUnsplashPhoto = (name) => name && name.includes('on Unsplash');

      const getImgSrcAndCors = (url) => {
        if (!url) return '';
        if (url.startsWith('data:') || url.startsWith('blob:')) {
          return `src="${url}"`;
        }
        return `src="${url}" crossorigin="anonymous"`;
      };

      // 更新目前卡片的特定欄位
      const updateActiveCard = (field, value) => {
        setCards(prev => prev.map(card => {
          if (card.id === activeCardId) {
            return { ...card, [field]: value };
          }
          return card;
        }));
      };

      // 新增卡片
      const handleAddCard = (type = 'content') => {
        const newId = Date.now().toString();
        const newCard = {
          id: newId,
          title: type === 'cover' ? '新封面標題' : '新卡片標題',
          content: type === 'cover' ? '封面副標題或說明' : '請在這裡輸入卡片的內文說明，排版會自動適應高度並呈現美觀的文字行高與間距。',
          image: 'https://images.unsplash.com/photo-1507842229512-238dd25936ce?auto=format&fit=crop&w=800&q=80',
          imageName: '預設書本圖',
          cardType: type
        };
        setCards(prev => [...prev, newCard]);
        setActiveCardId(newId);
      };

      // 刪除卡片
      const handleDeleteCard = (id, e) => {
        e.stopPropagation();
        if (cards.length <= 1) {
          return;
        }
        const index = cards.findIndex(c => c.id === id);
        const filtered = cards.filter(c => c.id !== id);
        setCards(filtered);
        if (activeCardId === id) {
          const nextActive = filtered[index - 1] || filtered[0];
          setActiveCardId(nextActive.id);
        }
      };

      // 複製卡片
      const handleDuplicateCard = (card, e) => {
        e.stopPropagation();
        const newCard = {
          ...card,
          id: Date.now().toString(),
          title: card.title + ' (複本)'
        };
        setCards(prev => [...prev, newCard]);
        setActiveCardId(newCard.id);
      };

      // 處理圖片上傳
      const handleImageUpload = (e, target) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          if (target === 'logo') {
            setLogo(event.target.result);
          } else if (target === 'card-image') {
            updateActiveCard('image', event.target.result);
            updateActiveCard('imageName', file.name);
          }
        };
        reader.readAsDataURL(file);
      };

      // 清理 LLM 回傳的 Markdown 或雜訊，只保留 JSON
      const cleanJson = (text) => {
        let cleaned = text.trim();
        if (cleaned.startsWith('```json')) {
          cleaned = cleaned.substring(7);
        } else if (cleaned.startsWith('```')) {
          cleaned = cleaned.substring(3);
        }
        if (cleaned.endsWith('```')) {
          cleaned = cleaned.substring(0, cleaned.length - 3);
        }
        return cleaned.trim();
      };

      // ==================== Unsplash API ====================
      const searchUnsplash = async (query, perPage = 9) => {
        if (!unsplashKey.trim()) return [];
        if (unsplashKey.trim() === 'mock-key' || unsplashKey.trim() === 'demo') {
          return [
            {
              id: "mock-photo-1",
              alt_description: "Mock Photo",
              urls: {
                regular: "https://images.unsplash.com/photo-1507842229512-238dd25936ce?auto=format&fit=crop&w=800&q=80",
                small: "https://images.unsplash.com/photo-1507842229512-238dd25936ce?auto=format&fit=crop&w=400&q=80"
              },
              links: {
                html: "https://unsplash.com/photos/1"
              },
              user: {
                name: "Demo Photographer",
                links: {
                  html: "https://unsplash.com"
                }
              }
            }
          ];
        }
        const res = await fetch(
          `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=${perPage}&orientation=landscape`,
          { headers: { 'Authorization': `Client-ID ${unsplashKey.trim()}` } }
        );
        if (!res.ok) throw new Error(`Unsplash API: ${res.status}`);
        const data = await res.json();
        return data.results || [];
      };

      const handleUnsplashSearch = async () => {
        if (!unsplashQuery.trim() || !unsplashKey.trim()) return;
        setIsSearchingUnsplash(true);
        try {
          const results = await searchUnsplash(unsplashQuery.trim());
          setUnsplashResults(results);
        } catch (err) {
          console.error('Unsplash search error:', err);
          alert('Unsplash 搜尋失敗，請確認 API Key 是否正確。');
          setUnsplashResults([]);
        } finally {
          setIsSearchingUnsplash(false);
        }
      };

      // ==================== Streaming JSON Parser ====================
      // Incrementally parse a partial JSON array string to extract complete objects
      const parsePartialJsonArray = (text) => {
        const results = [];
        let depth = 0;
        let inString = false;
        let escape = false;
        let objStart = -1;

        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (escape) { escape = false; continue; }
          if (ch === '\\') { escape = true; continue; }
          if (ch === '"') { inString = !inString; continue; }
          if (inString) continue;

          if (ch === '{') {
            if (depth === 0) objStart = i;
            depth++;
          } else if (ch === '}') {
            depth--;
            if (depth === 0 && objStart !== -1) {
              const slice = text.substring(objStart, i + 1);
              try {
                results.push(JSON.parse(slice));
              } catch (e) { /* incomplete object, skip */ }
              objStart = -1;
            }
          }
        }
        return results;
      };

      // 呼叫 Gemini API 智慧生成卡片 (Streaming)
      const handleAiGenerate = async (customText, overrideOptions = {}) => {
        const textToUse = (typeof customText === 'string') ? customText : articleText;
        const countToUse = (typeof overrideOptions.count === 'number' && overrideOptions.count > 0)
          ? overrideOptions.count
          : targetCount;
        const keyToUse = (typeof overrideOptions.apiKey === 'string' && overrideOptions.apiKey.trim())
          ? overrideOptions.apiKey.trim()
          : apiKey.trim();
        const modelToUse = overrideOptions.model
          ? overrideOptions.model
          : (selectedModel === 'custom' ? customModel.trim() : selectedModel);
        const modeToUse = overrideOptions.genMode || genMode;

        if (!keyToUse) {
          alert('請先輸入並儲存您的 Gemini API Key！');
          return;
        }
        if (!textToUse.trim()) {
          alert('請先輸入文章內容再進行生成！');
          return;
        }

        setIsAiGenerating(true);
        setStreamingCards([]);
        setStreamingText('');
        setActiveStreamIndex(-1);

        // If replace mode, clear existing cards immediately
        if (modeToUse === 'replace') {
          setCards([]);
          setActiveCardId('');
        }

        try {
          if (!window.GoogleGenAI) {
            throw new Error('Gemini SDK 尚未載入完成，請稍後再試。');
          }

          // 如果有填寫自訂 Base URL，則設定預設 API 端點
          if (apiEndpoint && apiEndpoint.trim()) {
            try {
              window.setDefaultBaseUrls({
                geminiUrl: apiEndpoint.trim()
              });
            } catch (err) {
              console.warn("無法設定自訂 Base URL:", err);
            }
          }

          const ai = new window.GoogleGenAI({ apiKey: keyToUse });
          if (!modelToUse) {
            throw new Error('請指定要使用的模型名稱！');
          }

          // Use streaming API — single request, counts as 1 RPD
          const stream = await ai.models.generateContentStream({
            model: modelToUse,
            contents: `請幫我將以下文章整理成 ${countToUse} 張卡片：\n\n${textToUse}`,
            config: {
              responseMimeType: 'application/json',
              responseSchema: {
                type: 'array',
                items: {
                  type: 'object',
                  properties: {
                    cardType: {
                      type: 'string',
                      enum: ['cover', 'content'],
                      description: '卡片類型，第一張卡片必須是 cover，其餘為 content'
                    },
                    title: {
                      type: 'string',
                      description: '卡片標題或重點標題'
                    },
                    content: {
                      type: 'string',
                      description: '卡片詳細摘要內容'
                    },
                    imageKeyword: {
                      type: 'string',
                      description: '用於搜尋 Unsplash 背景圖片的 1-3 個英文關鍵字，例如 ocean sunset, technology, education book'
                    }
                  },
                  required: ['cardType', 'title', 'content', 'imageKeyword']
                }
              },
              systemInstruction: `你是一個專業的內容摘要與社群簡報卡片製作專家。你的任務是閱讀使用者提供的一篇文章，並將其整理成一套美觀、邏輯清晰的社群卡片內容（投影片/簡報卡片）。
注意事項：
1. 第一張卡片必須是 "cardType": "cover"，作為封面。
2. 其餘卡片為 "cardType": "content"。
3. 總卡片數量限制在使用者指定的數量範圍內。
4. 內容與標題必須使用「繁體中文（台灣）」，語氣親切流暢、條理清晰。
5. 內容字數限制為130個中文字以內，建議在100~130字之間。
6. 每張卡片需提供 imageKeyword 欄位，使用 1-3 個英文單詞描述適合的背景圖片，例如 "ocean sunset", "technology", "classroom"。選擇視覺性強的具體名詞。`,
              temperature: 0.7
            }
          });

          let accumulated = '';
          let prevParsedCount = 0;
          const baseTimestamp = Date.now();

          for await (const chunk of stream) {
            const chunkText = chunk.text;
            if (!chunkText) continue;
            accumulated += chunkText;

            // Parse all complete objects found so far
            const parsedObjects = parsePartialJsonArray(accumulated);

            if (parsedObjects.length > prevParsedCount) {
              // New card(s) completed!
              const newCards = parsedObjects.slice(prevParsedCount).map((item, idx) => {
                const globalIdx = prevParsedCount + idx;
                const isCover = item.cardType === 'cover';
                return {
                  id: (baseTimestamp + globalIdx).toString(),
                  title: item.title || (isCover ? '無標題封面' : `第 ${globalIdx} 頁`),
                  content: item.content || '',
                  image: 'https://images.unsplash.com/photo-1507842229512-238dd25936ce?auto=format&fit=crop&w=800&q=80',
                  imageName: '預設書本圖',
                  cardType: isCover ? 'cover' : 'content',
                  _isNew: true,  // animation flag
                  _imageKeyword: item.imageKeyword || ''
                };
              });

              prevParsedCount = parsedObjects.length;

              // Add completed cards to the real card list
              setCards(prev => {
                const updated = [...prev, ...newCards];
                return updated;
              });
              // Auto-select the latest card to show it in preview
              setActiveCardId(newCards[newCards.length - 1].id);

              // Auto-fetch Unsplash images for new cards
              if (unsplashKey.trim()) {
                newCards.forEach(card => {
                  if (card._imageKeyword) {
                    searchUnsplash(card._imageKeyword, 1).then(results => {
                      if (results.length > 0) {
                        const photo = results[0];
                        setCards(prev => prev.map(c => 
                          c.id === card.id 
                            ? { 
                                ...c, 
                                image: photo.urls.regular, 
                                imageName: `Photo by ${photo.user.name} on Unsplash`,
                                imageLink: photo.links?.html || 'https://unsplash.com',
                                authorLink: photo.user?.links?.html || 'https://unsplash.com'
                              }
                            : c
                        ));
                      }
                    }).catch(() => {});
                  }
                });
              }
            }

            // Update streaming visual state
            setStreamingText(accumulated);
            setActiveStreamIndex(parsedObjects.length); // index of card currently being written

            // Update streaming cards (including incomplete ones for live preview)
            setStreamingCards(parsedObjects);
          }

          // Final cleanup — make sure all cards are added
          const finalParsed = parsePartialJsonArray(accumulated);
          if (finalParsed.length > prevParsedCount) {
            const remainingCards = finalParsed.slice(prevParsedCount).map((item, idx) => {
              const globalIdx = prevParsedCount + idx;
              const isCover = item.cardType === 'cover';
              return {
                id: (baseTimestamp + globalIdx).toString(),
                title: item.title || (isCover ? '無標題封面' : `第 ${globalIdx} 頁`),
                content: item.content || '',
                image: 'https://images.unsplash.com/photo-1507842229512-238dd25936ce?auto=format&fit=crop&w=800&q=80',
                imageName: '預設書本圖',
                cardType: isCover ? 'cover' : 'content',
                _imageKeyword: item.imageKeyword || ''

            setCards(prev => [...prev, ...remainingCards]);
            setActiveCardId(remainingCards[remainingCards.length - 1].id);

            // Auto-fetch Unsplash images for remaining cards
            if (unsplashKey.trim()) {
              remainingCards.forEach(card => {
                if (card._imageKeyword) {
                  searchUnsplash(card._imageKeyword, 1).then(results => {
                    if (results.length > 0) {
                      const photo = results[0];
                        setCards(prev => prev.map(c => 
                          c.id === card.id 
                            ? { 
                                ...c, 
                                image: photo.urls.regular, 
                                imageName: `Photo by ${photo.user.name} on Unsplash`,
                                imageLink: photo.links?.html || 'https://unsplash.com',
                                authorLink: photo.user?.links?.html || 'https://unsplash.com'
                              }
                            : c
                        ));
                    }
                  }).catch(() => {});
                }
              });
            }
          }

          // Clear animation flags after a moment
          setTimeout(() => {
            setCards(prev => prev.map(c => ({ ...c, _isNew: false })));
          }, 800);

          setStreamingCards([]);
          setStreamingText('');
          setActiveStreamIndex(-1);

        } catch (error) {
          console.error(error);
          alert(`生成失敗: ${error.message}\n\n提示：請確認您的 Gemini API Key 是否正確且具有使用該模型的權限。`);

                  flex-shrink: 0;
                ">
                  <img ${getImgSrcAndCors(logo)} style="width: 100%; height: 100%; object-fit: cover;" />
                </div>
                ${isUnsplashPhoto(cardData.imageName) ? `
                  <div style="
                    background-color: rgba(0, 0, 0, 0.45);
                    color: rgba(255, 255, 255, 0.9);
                    padding: 6px 14px;
                    border-radius: 20px;
                    font-family: 'Noto Sans TC', sans-serif;
                    font-size: 14px;
                    font-weight: 400;
                    white-space: nowrap;
                    margin-left: 20px;
                  ">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 6px; position: relative; top: -1px;">
                      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                      <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    <span style="vertical-align: middle; position: relative; top: -8px;">${cardData.imageName}</span>
                  </div>
                ` : ''}
              </div>
            </div>
          `;

          const imgs = tempContainer.querySelectorAll('img');
          const img = imgs[0];
          const logoImg = imgs[1];

          const checkLoaded = () => {
            document.fonts.ready.then(() => {
              setTimeout(() => {
                html2canvas(tempContainer.querySelector('#export-target'), {
                  useCORS: true,
                  scale: 2, // 雙倍超高解析度
                  backgroundColor: null,
                  logging: false
                }).then(canvas => {
                  canvas.toBlob(blob => {
                    document.body.removeChild(tempContainer);
                    resolve(blob);
                  }, 'image/png');
                }).catch(err => {
                  console.error("渲染出錯", err);
                  document.body.removeChild(tempContainer);
                  resolve(null);
                });
              }, 400); // 確保繪製緩衝時間
            });
          };

          if (img.complete && logoImg.complete) {
            checkLoaded();
          } else {
            let loadedCount = 0;
            const onImgLoad = () => {
              loadedCount++;
              if (loadedCount >= 2) checkLoaded();
            };
            img.onload = onImgLoad;
            logoImg.onload = onImgLoad;
            img.onerror = onImgLoad;
            logoImg.onerror = onImgLoad;
          }
        });
      };

      // 導出單張卡片
      const handleExportSingle = async () => {
        setIsGenerating(true);
        const blob = await renderCardToBlob(activeCard);
        if (blob) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `${activeCard.title || 'card'}.png`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        }
        setIsGenerating(false);
      };

      // 批次打包下載 ZIP
      const handleExportAll = async () => {
        setIsGenerating(true);
        setProgress({ current: 0, total: cards.length });
        const zip = new JSZip();

        for (let i = 0; i < cards.length; i++) {
          setProgress(prev => ({ ...prev, current: i + 1 }));
          const card = cards[i];
          const blob = await renderCardToBlob(card);
          if (blob) {
            const safeName = `${i + 1}_${card.title.replace(/[\\/:*?"<>|]/g, '_')}`;
            zip.file(`${safeName}.png`, blob);
          }
        }

        const content = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(content);
        const link = document.createElement('a');
        link.download = `卡片批次導出_${Date.now()}.zip`;
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);

        setIsGenerating(false);
      };

      // CSV 解析器 (支援引號與雙引號轉義、逗號及換行)
      const parseCSV = (text) => {
        const lines = [];
        let row = [""];
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const nextChar = text[i + 1];
          if (char === '"') {
            if (inQuotes && nextChar === '"') {
              row[row.length - 1] += '"';
              i++; // 跳過下一個雙引號
            } else {
              inQuotes = !inQuotes;
            }
          } else if (char === ',' && !inQuotes) {
            row.push("");
          } else if ((char === '\r' || char === '\n') && !inQuotes) {
            if (char === '\r' && nextChar === '\n') {
              i++; // 跳過 \n
            }
            lines.push(row);
            row = [""];
          } else {
            row[row.length - 1] += char;
          }
        }
        if (row.length > 1 || row[0] !== "") {
          lines.push(row);
        }
        return lines;
      };

      // 導出 CSV (儲存編輯狀態與卡片資料)
      const handleExportCSV = () => {
        try {
          const headers = ['卡片類型', '標題', '內容', '圖片網址', '圖片名稱', '背景顏色', '圖片比例'];
          const csvRows = [headers.join(',')];
          
          cards.forEach((card) => {
            const row = [
              card.cardType || 'content',
              card.title || '',
              card.content || '',
              card.image || '',
              card.imageName || '',
              bgColor || '',
              aspectRatio || ''
            ].map(val => {
              const escaped = val.toString().replace(/"/g, '""');
              return `"${escaped}"`;
            });
            csvRows.push(row.join(','));
          });
          
          // 新增 UTF-8 BOM 確保 Excel 開啟時中文不亂碼
          const csvContent = "\uFEFF" + csvRows.join('\r\n');
          const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `BatchCard_編輯狀態_${Date.now()}.csv`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error(err);
          window.alert('導出 CSV 失敗: ' + err.message);
        }
      };

      // 導入 CSV (載入編輯狀態與卡片資料)
      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!window.confirm('導入 CSV 將會覆蓋目前所有的卡片與設定，是否確定？')) {
          e.target.value = ''; // 重設 file input
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const parsedLines = parseCSV(text);
            if (parsedLines.length < 2) {
              window.alert('CSV 檔案格式不正確或無資料！');
              return;
            }

            const headers = parsedLines[0].map(h => h.trim().toLowerCase());
            
            // 對應欄位索引（支援中英文）
            const getIndex = (keys) => {
              return headers.findIndex(h => keys.some(k => h.includes(k.toLowerCase())));
            };

            const cardTypeIdx = getIndex(['card type', 'cardtype', '卡片類型', '類型']);
            const titleIdx = getIndex(['title', '標題']);
            const contentIdx = getIndex(['content', '內容', '內文', '摘要']);
            const imageIdx = getIndex(['image', '圖片網址', '圖片', '配圖']);
            const imageNameIdx = getIndex(['image name', 'image_name', '圖片名稱', '名稱']);
            const bgColorIdx = getIndex(['background color', 'bgcolor', '背景顏色', '顏色']);
            const aspectRatioIdx = getIndex(['aspect ratio', 'aspectratio', '圖片比例', '比例']);

            const getColVal = (row, idx) => {
              if (idx === -1 || idx >= row.length) return '';
              return row[idx] || '';
            };

            if (titleIdx === -1 || contentIdx === -1) {
              window.alert('CSV 欄位解析失敗！必須包含「標題」與「內容」欄位。');
              return;
            }

            const importedCards = [];
            const baseTimestamp = Date.now();

            for (let i = 1; i < parsedLines.length; i++) {
              const row = parsedLines[i];
              if (row.length === 1 && row[0] === '') continue; // 跳過空行

              const title = getColVal(row, titleIdx);
              const content = getColVal(row, contentIdx);
              
              if (!title && !content) continue; // 標題和內容皆空則跳過

              const cardTypeRaw = getColVal(row, cardTypeIdx).trim().toLowerCase();
              const cardType = (cardTypeRaw === 'cover') ? 'cover' : 'content';
              const image = getColVal(row, imageIdx) || 'https://images.unsplash.com/photo-1507842229512-238dd25936ce?auto=format&fit=crop&w=800&q=80';
              const imageName = getColVal(row, imageNameIdx) || '預設書本圖';

              importedCards.push({
                id: (baseTimestamp + i).toString(),
                title,
                content,
                image,
                imageName,
                cardType
              });
            }

            if (importedCards.length === 0) {
              window.alert('未從 CSV 檔案中讀取到任何有效卡片！');
              return;
            }

            // 如果 CSV 裡有保存全局設定，則還原設定
            const firstDataRow = parsedLines[1];
            if (firstDataRow) {
              const csvBgColor = getColVal(firstDataRow, bgColorIdx).trim();
              if (csvBgColor && /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(csvBgColor)) {
                setBgColor(csvBgColor);
              }
              const csvAspectRatio = getColVal(firstDataRow, aspectRatioIdx).trim();
              if (csvAspectRatio === '4-5' || csvAspectRatio === '1-1') {
                setAspectRatio(csvAspectRatio);
              }
            }

            setCards(importedCards);
            setActiveCardId(importedCards[0].id);
            window.alert(`已成功導入 ${importedCards.length} 張卡片！`);
          } catch (err) {
            console.error(err);
            window.alert('導入 CSV 失敗: ' + err.message);
          } finally {
            e.target.value = ''; // 重設 file input
          }
        };
        reader.readAsText(file, 'UTF-8');
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* 導覽列 */}
          <header className="bg-[var(--Card-Bg)] border-b border-[var(--Card-Border)] px-6 py-4 flex flex-wrap justify-between items-center gap-4">
            <div className="flex items-center gap-3">
              <span className="bg-[var(--Primary)] text-[var(--on-primary)] font-bold p-2 rounded-lg text-lg flex items-center justify-center"><span className="material-symbols-outlined">style</span></span>
              <div>
                <h1 className="text-xl font-bold tracking-wider text-[var(--Text)]">BatchCard 批次卡片產生器</h1>
              </div>
            </div>
          </header>

          {/* 主要工作區 */}
          <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 p-6">
            
            {/* 左側：控制台（佔 5 欄） */}
            <section className="lg:col-span-5 flex flex-col gap-6 max-h-[calc(100vh-140px)] overflow-y-auto no-scrollbar">
              
              {/* 品牌與版面設定 */}
              <div className="card space-y-4">
                <h2 className="text-md font-bold text-[var(--Text)] border-b border-[var(--Card-Border)] pb-2 mb-3 flex items-center gap-2"><span className="material-symbols-outlined" style={{fontSize: '20px'}}>palette</span> 品牌與全局設定</h2>
                
                <div className="grid grid-cols-2 gap-4">
                  {/* 背景色 */}
                  <div className="form-group mb-0">
                    <label className="form-label">下半部背景顏色</label>
                    <div className="flex gap-2 items-center">
                      <input 
                        type="color" 
                        value={bgColor} 
                        onChange={(e) => setBgColor(e.target.value)}
                        className="w-10 h-10 rounded border border-[var(--Input-Border)] bg-transparent cursor-pointer"
                      />
                      <span className="text-sm font-mono text-[var(--Text-Muted)] uppercase">{bgColor}</span>
                    </div>
                  </div>
                  
                  {/* 比例 */}
                  <div className="form-group mb-0">
                    <label className="form-label">圖片比例</label>
                    <select 
                      value={aspectRatio} 
                      onChange={(e) => setAspectRatio(e.target.value)}
                      className="form-input form-input-sm"
                    >
                      <option value="4-5">4 : 5 (IG、社群貼文)</option>
                      <option value="1-1">1 : 1 (正方形卡片)</option>
                    </select>
                  </div>
                </div>

                {/* Logo 上傳 */}
                <div className="form-group mb-0">
                  <label className="form-label">左下角品牌 Logo 浮水印</label>
                  <div className="flex items-center gap-3">
                    <img src={logo} className="w-12 h-12 rounded-full border border-[var(--Card-Border)] object-cover bg-slate-950" alt="Logo" />
                    <label className="btn btn-secondary btn-sm cursor-pointer">
                      更換 Logo
                      <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'logo')} className="hidden" />
                    </label>
                    <button 
                      onClick={() => setLogo(DEFAULT_LOGO)} 
                      className="text-xs text-red-400 hover:text-red-300 transition-colors ml-2"
                    >
                      恢復預設
                    </button>
                  </div>
                </div>
              </div>

              {/* Gemini AI 智慧生成 */}
              <div className="card space-y-4">
                <h2 className="text-md font-bold text-[var(--Text)] border-b border-[var(--Card-Border)] pb-2 mb-3 flex items-center gap-2">
                  <span className="material-symbols-outlined text-[var(--Primary)] animate-pulse" style={{fontSize: '20px'}}>psychology</span> Gemini AI 智慧生成
                </h2>
                
                {/* API 設定 */}
                <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-800 space-y-3">
                  <div className="flex justify-between items-center">
                    <span className="text-xs font-semibold text-slate-400">Gemini API 設定</span>
                    <button 
                      type="button" 
                      onClick={() => setShowApiSettings(!showApiSettings)}
                      className="text-xs text-[var(--Primary)] hover:underline flex items-center gap-1"
                    >
                      <span className="material-symbols-outlined" style={{fontSize: '14px'}}>settings</span>
                      {showApiSettings ? '隱藏設定' : '展開設定'}
                    </button>
                  </div>
                  
                  {(showApiSettings || !apiKey) && (
                    <div className="space-y-3 pt-2 border-t border-slate-800/60">
                      <div>
                        <label className="form-label text-[10px]">Gemini API Key</label>
                        <div className="relative">
                          <input 
                            type={showApiKeyText ? "text" : "password"}
                            value={apiKey}
                            onChange={(e) => {
                              setApiKey(e.target.value);
                              localStorage.setItem('gemini_api_key', e.target.value);
                            }}
                            placeholder="AIzaSy..."
                            className="form-input form-input-sm pr-10"
                          />
                          <button
                            type="button"
                            onClick={() => setShowApiKeyText(!showApiKeyText)}
                            className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"
                          >
                            <span className="material-symbols-outlined" style={{fontSize: '18px'}}>
                              {showApiKeyText ? 'visibility_off' : 'visibility'}
                            </span>
                          </button>
                        </div>
                        <p className="text-[10px] text-slate-500 mt-1">
                          密鑰會儲存在您的瀏覽器本地 (localStorage)
                        </p>
                      </div>
                      
                      <div>
                        <label className="form-label text-[10px]">API 端點/代理 (選填)</label>
                        <input 
                          type="text"
                          value={apiEndpoint}
                          onChange={(e) => {
                            setApiEndpoint(e.target.value);
                            localStorage.setItem('gemini_api_endpoint', e.target.value);
                          }}
                          placeholder="例如: https://gateway.ai.cloudflare.com/..."
                          className="form-input form-input-sm"
                        />
                      </div>

                      {/* Unsplash API Key */}
                      <div className="pt-2 border-t border-slate-800/40">
                        <label className="form-label text-[10px]">Unsplash API Key (圖片搜尋)</label>
                        <div className="relative">
                          <input 
                            type={showUnsplashKeyText ? "text" : "password"}
                            value={unsplashKey}
                            onChange={(e) => {
                              setUnsplashKey(e.target.value);
                              localStorage.setItem('unsplash_api_key', e.target.value);
                            }}
                            placeholder="Access Key..."
                            className="form-input form-input-sm pr-10"
                          />
                          <button
                            type="button"
                            onClick={() => setShowUnsplashKeyText(!showUnsplashKeyText)}
                            className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"
                          >
                            <span className="material-symbols-outlined" style={{fontSize: '18px'}}>
                              {showUnsplashKeyText ? 'visibility_off' : 'visibility'}
                            </span>
                          </button>
                        </div>
                        <p className="text-[10px] text-slate-500 mt-1">
                          免費申請：<a href="https://unsplash.com/developers" target="_blank" rel="noopener noreferrer" className="text-[var(--Primary)] hover:underline">unsplash.com/developers</a>（50 次/小時）
                        </p>
                      </div>
                    </div>
                  )}
                </div>

                {/* 生成參數 */}
                <div className="space-y-3">
                  <div>
                    <label className="form-label text-[10px]">選擇 Gemini 模型</label>
                    <select 
                      value={selectedModel}
                      onChange={(e) => {
                        setSelectedModel(e.target.value);
                        localStorage.setItem('gemini_model', e.target.value);
                      }}
                      className="form-input form-input-sm bg-slate-900 border-slate-700"
                    >
                      <option value="gemini-3.5-flash">gemini-3.5-flash (推薦)</option>
                      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                      <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (最快)</option>
                      <option value="custom">自訂模型名稱...</option>
                    </select>
                    
                    {selectedModel === 'custom' && (
                      <input 
                        type="text"
                        value={customModel}
                        onChange={(e) => {
                          setCustomModel(e.target.value);
                          localStorage.setItem('gemini_custom_model', e.target.value);
                        }}
                        placeholder="例如: gemini-3.5-flash"
                        className="form-input form-input-sm mt-2"
                      />
                    )}
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="form-label text-[10px]">預計卡片張數</label>
                      <input 
                        type="number"
                        min="1"
                        max="10"
                        value={targetCount}
                        onChange={(e) => setTargetCount(Math.min(10, Math.max(1, parseInt(e.target.value) || 5)))}
                        className="form-input form-input-sm"
                      />
                    </div>
                    <div>
                      <label className="form-label text-[10px]">生成模式</label>
                      <select 
                        value={genMode}
                        onChange={(e) => setGenMode(e.target.value)}
                        className="form-input form-input-sm bg-slate-900 border-slate-700"
                      >
                        <option value="replace">替換現有卡片</option>
                        <option value="append">追加至後面</option>
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="form-label text-[10px]">輸入文章內容</label>
                    <textarea 
                      rows="5"
                      value={articleText}
                      onChange={(e) => setArticleText(e.target.value)}
                      placeholder="請貼上您想產生卡片的文章內容..."
                      className="form-input form-input-sm resize-none leading-relaxed text-sm"
                    />
                  </div>

                  <button
                    type="button"
                    onClick={handleAiGenerate}
                    disabled={isAiGenerating || !apiKey.trim() || !articleText.trim()}
                    className={`btn btn-primary w-full flex items-center justify-center gap-2 ${
                      (isAiGenerating || !apiKey.trim() || !articleText.trim()) ? 'opacity-50 cursor-not-allowed' : ''
                    }`}
                  >
                    {isAiGenerating ? (
                      <>
                        <span className="ai-sparkle material-symbols-outlined" style={{fontSize: '18px'}}>auto_awesome</span>
                        <span>AI 串流生成中... ({streamingCards.length}/{targetCount})</span>
                      </>
                    ) : (
                      <>
                        <span className="material-symbols-outlined" style={{fontSize: '18px'}}>auto_awesome</span>
                        開始 AI 智慧生成
                      </>
                    )}
                  </button>
                  
                  {/* Streaming progress indicator */}
                  {isAiGenerating && (
                    <div className="space-y-2 mt-3">
                      <div className="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                        <div 
                          className="h-1.5 rounded-full transition-all duration-500 ease-out"
                          style={{
                            width: `${Math.max(5, (streamingCards.length / targetCount) * 100)}%`,
                            background: 'linear-gradient(90deg, #81B2D1, #60d9fa, #81B2D1)',
                            backgroundSize: '200% 100%',
                            animation: 'shimmer 1.5s linear infinite'
                          }}
                        />
                      </div>
                      <p className="text-[11px] text-[var(--Primary)] text-center font-medium flex items-center justify-center gap-1.5">
                        <span className="material-symbols-outlined" style={{fontSize: '14px'}}>stream</span>
                        串流模式：單次 API 請求，即時生成中
                      </p>
                    </div>
                  )}
                  
                  {!apiKey.trim() && !isAiGenerating && (
                    <p className="text-xs text-yellow-500/90 text-center flex items-center justify-center gap-1 mt-2">
                      <span className="material-symbols-outlined" style={{fontSize: '14px'}}>warning</span>
                      請先在上方展開設定並輸入 Gemini API Key
                    </p>
                  )}
                </div>
              </div>

              {/* 卡片清單管理 */}
              <div className="card flex-1 flex flex-col min-h-[300px]">
                <div className="flex justify-between items-center border-b border-[var(--Card-Border)] pb-2 mb-3">
                  <h2 className="text-md font-bold text-[var(--Text)] flex items-center gap-2"><span className="material-symbols-outlined" style={{fontSize: '20px'}}>folder_open</span> 卡片清單 ({cards.length})</h2>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => handleAddCard('content')}
                      className="btn btn-primary btn-sm flex items-center gap-1"
                    >
                      <span className="material-symbols-outlined" style={{fontSize: '14px'}}>add</span> 內頁
                    </button>
                    <button 
                      onClick={() => handleAddCard('cover')}
                      className="btn btn-secondary btn-sm flex items-center gap-1 border-slate-700 bg-slate-800 hover:bg-slate-700 text-white"
                    >
                      <span className="material-symbols-outlined" style={{fontSize: '14px'}}>auto_stories</span> 封面
                    </button>
                  </div>
                </div>

                {/* CSV 備份與導入/導出功能列 */}
                <div className="flex justify-between items-center gap-2 mb-3 pb-2 border-b border-dashed border-[var(--Card-Border)]">
                  <span className="text-[11px] text-[var(--Text-Muted)] font-medium flex items-center gap-1 select-none">
                    <span className="material-symbols-outlined" style={{fontSize: '14px'}}>backup</span>
                    CSV 編輯狀態備份：
                  </span>
                  <div className="flex gap-2">
                    <button
                      type="button"
                      onClick={handleExportCSV}
                      className="btn btn-secondary btn-sm py-1 px-3 flex items-center gap-1 text-slate-300 border-slate-700 bg-slate-800 hover:bg-slate-700 text-xs font-normal"
                    >
                      <span className="material-symbols-outlined" style={{fontSize: '14px'}}>download</span>
                      導出 CSV
                    </button>
                    <label className="btn btn-secondary btn-sm py-1 px-3 flex items-center gap-1 text-slate-300 border-slate-700 bg-slate-800 hover:bg-slate-700 text-xs font-normal cursor-pointer mb-0">
                      <span className="material-symbols-outlined" style={{fontSize: '14px'}}>upload</span>
                      導入 CSV
                      <input type="file" accept=".csv" onChange={handleImportCSV} className="hidden" />
                    </label>
                  </div>
                </div>

                <div className="space-y-2 overflow-y-auto max-h-[300px] pr-1">
                  {cards.map((card, index) => {
                    const isActive = activeCardId === card.id;
                    const isNewFromStream = card._isNew;
                    return (
                      <div 
                        key={card.id}
                        onClick={() => setActiveCardId(card.id)}
                        style={{
                          backgroundColor: isActive ? 'var(--Primary-20)' : 'var(--Accent)',
                          borderColor: isActive ? 'var(--Primary)' : 'var(--Card-Border)',
                          color: isActive ? 'var(--Text)' : 'var(--Text-Muted)'
                        }}
                        className={`p-3 rounded-xl border flex items-center justify-between cursor-pointer transition-all duration-200 hover:border-[var(--Primary)] relative ${isNewFromStream ? 'ai-card-enter ai-writing' : ''}`}
                      >
                        {/* Shimmer overlay for newly streamed cards */}
                        {isNewFromStream && <div className="ai-shimmer-overlay" />}
                        
                        <div className="flex items-center gap-3 overflow-hidden">
                          <span className="text-xs bg-slate-800 text-[var(--Text-Muted)] font-mono px-1.5 py-0.5 rounded">
                            {index + 1}
                          </span>
                          <img src={card.image} className="w-10 h-10 object-cover rounded-lg flex-shrink-0" alt="" />
                          <div className="overflow-hidden">
                            <p className="font-bold text-sm truncate text-white flex items-center gap-1.5">
                              {card.cardType === 'cover' && (
                                <span className="text-[10px] bg-blue-500/20 text-blue-300 px-1.5 py-0.2 rounded border border-blue-500/30 font-normal">封面</span>
                              )}
                              <span className={isNewFromStream ? 'ai-typing-cursor' : ''}>{card.title || '無標題'}</span>
                            </p>
                            <p className="text-xs text-[var(--Text-Muted)] truncate">{card.content || '無內容'}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-1 flex-shrink-0">
                          <button 
                            onClick={(e) => handleDuplicateCard(card, e)}
                            title="複製此張卡片"
                            className="p-1 text-[var(--Text-Muted)] hover:text-white transition-colors"
                          >
                            <span className="material-symbols-outlined" style={{fontSize: '18px'}}>content_copy</span>
                          </button>
                          <button 
                            onClick={(e) => handleDeleteCard(card.id, e)}
                            title="刪除此張卡片"
                            className="p-1 text-red-400 hover:text-red-300 transition-colors"
                          >
                            <span className="material-symbols-outlined" style={{fontSize: '18px'}}>delete</span>
                          </button>
                        </div>
                      </div>
                    );
                  })}
                  
                  {/* Ghost card: show what's currently being written */}
                  {isAiGenerating && activeStreamIndex >= 0 && (
                    <div className="p-3 rounded-xl border border-dashed border-[var(--Primary)] bg-[var(--Primary-10)] flex items-center gap-3 ai-stream-progress relative">
                      <span className="text-xs bg-[var(--Primary-30)] text-[var(--Primary)] font-mono px-1.5 py-0.5 rounded">
                        <span className="ai-sparkle">✦</span>
                      </span>
                      <div className="overflow-hidden flex-1">
                        <p className="font-bold text-sm text-[var(--Primary)] flex items-center gap-1.5">
                          <span className="material-symbols-outlined" style={{fontSize: '14px'}}>edit_note</span>
                          正在撰寫第 {streamingCards.length + 1} 張卡片...
                        </p>
                        <p className="text-[11px] text-[var(--Text-Muted)] truncate ai-typing-cursor">
                          AI 正在串流生成中
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* 編輯目前卡片內容 */}
              {activeCard && (
                <div className="card space-y-4">
                  <h2 className="text-md font-bold text-[var(--Text)] border-b border-[var(--Card-Border)] pb-2 mb-3 flex items-center gap-2"><span className="material-symbols-outlined" style={{fontSize: '20px'}}>edit</span> 編輯選定卡片</h2>
                  
                  {/* 卡片類型 */}
                  <div className="form-group mb-0">
                    <label className="form-label">卡片類型</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        type="button"
                        onClick={() => updateActiveCard('cardType', 'content')}
                        className={`py-2 px-4 rounded-xl font-bold text-xs transition flex items-center justify-center gap-2 ${
                          (activeCard.cardType || 'content') === 'content'
                            ? 'bg-[var(--Primary)] text-[var(--on-primary)] shadow-sm'
                            : 'bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-750'
                        }`}
                      >
                        <span className="material-symbols-outlined" style={{fontSize: '16px'}}>article</span> 一般內頁
                      </button>
                      <button
                        type="button"
                        onClick={() => updateActiveCard('cardType', 'cover')}
                        className={`py-2 px-4 rounded-xl font-bold text-xs transition flex items-center justify-center gap-2 ${
                          activeCard.cardType === 'cover'
                            ? 'bg-[var(--Primary)] text-[var(--on-primary)] shadow-sm'
                            : 'bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-750'
                        }`}
                      >
                        <span className="material-symbols-outlined" style={{fontSize: '16px'}}>auto_stories</span> 封面卡片
                      </button>
                    </div>
                  </div>
                  
                  {/* 標題 */}
                  <div className="form-group mb-0">
                    <label className="form-label">標題 (襯線體)</label>
                    <input 
                      type="text"
                      value={activeCard.title}
                      onChange={(e) => updateActiveCard('title', e.target.value)}
                      placeholder="請輸入大標題"
                      className="form-input form-input-sm"
                    />
                  </div>

                  {/* 內文 */}
                  <div className="form-group mb-0">
                    <label className="form-label">卡片內文 (建議 100 字以內效果最佳)</label>
                    <textarea 
                      rows="4"
                      value={activeCard.content}
                      onChange={(e) => updateActiveCard('content', e.target.value)}
                      placeholder="請輸入卡片細節描述..."
                      className="form-input form-input-sm resize-none leading-relaxed"
                    />
                    <div className="flex justify-between items-center mt-1">
                      <span className="text-[10px] text-yellow-500/80 flex items-center gap-1"><span className="material-symbols-outlined" style={{fontSize: '14px'}}>lightbulb</span> 提示：使用純 CSS 邊框畫斜角，轉檔導出完全不怕掉失！</span>
                      <span className="text-xs text-[var(--Text-Muted)] font-mono">目前字數: {activeCard.content?.length || 0}</span>
                    </div>
                  </div>

                  {/* 背景配圖 */}
                  <div className="form-group mb-0">
                    <label className="form-label">卡片背景配圖</label>
                    <div className="flex items-center gap-3">
                      <img src={activeCard.image} className="w-12 h-12 rounded border border-[var(--Card-Border)] object-cover bg-slate-900" alt="Card visual" />
                      <div className="flex-1 overflow-hidden">
                        <p className="text-xs text-[var(--Text-Muted)] truncate font-mono mb-1">{activeCard.imageName || '網路圖片'}</p>
                        <div className="flex gap-2">
                          <label className="btn btn-secondary btn-sm cursor-pointer">
                            <span className="material-symbols-outlined" style={{fontSize: '16px'}}>photo_camera</span> 上傳本地圖片
                            <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'card-image')} className="hidden" />
                          </label>
                          <button 
                            onClick={() => {
                              const url = prompt('請輸入外鏈圖片網址:');
                              if (url) {
                                updateActiveCard('image', url);
                                updateActiveCard('imageName', '手動輸入網址');
                              }
                            }}
                            className="btn btn-secondary btn-sm"
                          >
                            <span className="material-symbols-outlined" style={{fontSize: '16px'}}>link</span> 輸入網址
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Unsplash 圖片搜尋 */}
                  {unsplashKey.trim() ? (
                    <div className="form-group mb-0">
                      <label className="form-label flex items-center gap-1">
                        <span className="material-symbols-outlined" style={{fontSize: '14px'}}>image_search</span>
                        Unsplash 圖片搜尋
                      </label>
                      <div className="flex gap-2 mb-2">
                        <input
                          type="text"
                          value={unsplashQuery}
                          onChange={(e) => setUnsplashQuery(e.target.value)}
                          onKeyDown={(e) => e.key === 'Enter' && handleUnsplashSearch()}
                          placeholder="輸入英文關鍵字搜尋..."
                          className="form-input form-input-sm flex-1"
                        />
                        <button
                          onClick={handleUnsplashSearch}
                          disabled={isSearchingUnsplash || !unsplashQuery.trim()}
                          className={`btn btn-primary btn-sm flex-shrink-0 ${(isSearchingUnsplash || !unsplashQuery.trim()) ? 'opacity-50 cursor-not-allowed' : ''}`}
                        >
                          <span className="material-symbols-outlined" style={{fontSize: '16px'}}>
                            {isSearchingUnsplash ? 'hourglass_empty' : 'search'}
                          </span>
                        </button>
                      </div>

                      {isSearchingUnsplash && (
                        <div className="flex items-center justify-center py-3 gap-2">
                          <span className="text-xs text-[var(--Primary)]">搜尋中...</span>
                        </div>
                      )}

                      {unsplashResults.length > 0 && !isSearchingUnsplash && (
                        <div className="grid grid-cols-3 gap-1.5">
                          {unsplashResults.map((photo) => (
                            <div
                              key={photo.id}
                              onClick={() => {
                                updateActiveCard('image', photo.urls.regular);
                                updateActiveCard('imageName', `Photo by ${photo.user.name} on Unsplash`);
                                updateActiveCard('imageLink', photo.links?.html || 'https://unsplash.com');
                                updateActiveCard('authorLink', photo.user?.links?.html || 'https://unsplash.com');
                              }}
                              className="relative cursor-pointer rounded-lg overflow-hidden border-2 border-transparent hover:border-[var(--Primary)] transition-all group"
                              style={{aspectRatio: '4/3'}}
                            >
                              <img
                                src={photo.urls.small}
                                alt={photo.alt_description || ''}
                                className="w-full h-full object-cover"
                              />
                              <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-all flex items-end">
                                <p className="text-[9px] text-white/0 group-hover:text-white/90 p-1.5 truncate w-full bg-gradient-to-t from-black/60 to-transparent transition-all">
                                  {photo.user.name}
                                </p>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  ) : (
                    <p className="text-[10px] text-slate-500/70 flex items-center gap-1 mt-1">
                      <span className="material-symbols-outlined" style={{fontSize: '12px'}}>image_search</span>
                      在 API 設定中輸入 Unsplash Key 即可搜尋圖片
                    </p>
                  )}
                </div>
              )}
            </section>

            {/* 右側：即時高保真預覽與導出（佔 7 欄） */}
            <section className="lg:col-span-7 flex flex-col justify-between items-center card card-lg bg-slate-950/60">
              
              <div className="w-full mb-4 flex justify-between items-center">
                <span className="text-sm font-semibold text-slate-400 flex items-center gap-1"><span className="material-symbols-outlined" style={{fontSize: '18px'}}>visibility</span> 即時預覽效果 (向量與 CSS 邊框完美同步)</span>
                <span className="text-xs bg-blue-900/40 text-blue-300 border border-blue-800/50 px-2.5 py-1 rounded-full font-mono">
                  輸出解析度: 1600 × {aspectRatio === '4-5' ? '2000' : '1600'}
                </span>
              </div>

              {/* 預覽卡片框架 */}
              <div className="flex-1 flex items-center justify-center w-full py-4">
                <div 
                  id="preview-card"
                  style={{ backgroundColor: bgColor }}
                  className={`relative shadow-2xl overflow-hidden rounded-lg flex flex-col transition-all duration-300 select-none ${
                    aspectRatio === '4-5' ? 'w-[360px] h-[450px]' : 'w-[360px] h-[360px]'
                  } ${activeCard._isNew ? 'ai-writing' : ''}`}
                >
                  {/* AI streaming shimmer on preview */}
                  {activeCard._isNew && <div className="ai-shimmer-overlay rounded-lg" />}
                  {activeCard.cardType === 'cover' ? (
                    <>
                      {/* 封面背景圖 */}
                      {activeCard.image ? (
                        <img 
                          src={activeCard.image} 
                          className="absolute inset-0 w-full h-full object-cover pointer-events-none" 
                          alt="Preview background" 
                        />
                      ) : (
                        <div className="absolute inset-0 w-full h-full flex items-center justify-center text-slate-500 bg-slate-800 text-sm">無圖片</div>
                      )}

                      {/* 封面半透明黑色色塊與漸層 */}
                      <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/50 to-black/15 z-10 pointer-events-none" />

                      {/* 封面文字標題 */}
                      <div className="absolute inset-0 z-20 p-6 pb-14 flex flex-col justify-end box-border">
                        <h1 className="text-white font-serif-tc text-2xl font-black mb-2 leading-snug tracking-wide line-clamp-3" style={{ textShadow: '0 2px 8px rgba(0, 0, 0, 0.6)' }}>
                          {activeCard.title || '請輸入標題'}
                        </h1>
                        {activeCard.content && (
                          <p className="text-slate-200/90 font-light text-[11px] leading-relaxed text-left line-clamp-3" style={{ textShadow: '0 1px 4px rgba(0, 0, 0, 0.6)' }}>
                            {activeCard.content}
                          </p>
                        )}
                      </div>
                    </>
                  ) : (
                    <>
                      {/* 上半部圖片 */}
                      <div className="h-[45%] w-full overflow-hidden relative bg-slate-800">
                        {activeCard.image ? (
                          <img 
                            src={activeCard.image} 
                            className="w-full h-full object-cover pointer-events-none" 
                            alt="Preview background" 
                          />
                        ) : (
                          <div className="w-full h-full flex items-center justify-center text-slate-500 text-sm">無圖片</div>
                        )}
                        
                        {/* 【核心修正】預覽中的純 CSS 邊框三角形遮罩 (寬度固定 360px) */}
                        <div style={{
                          position: 'absolute',
                          bottom: '-1px',
                          left: 0,
                          width: 0,
                          height: 0,
                          borderStyle: 'solid',
                          borderWidth: '0 0 25px 360px',
                          borderColor: `transparent transparent ${bgColor} transparent`,
                          zIndex: 10,
                          pointerEvents: 'none'
                        }}></div>
                      </div>
                      
                      {/* 下半部文字 */}
                      <div className="h-[60%] pt-6 px-6 pb-14 flex flex-col justify-start relative box-border">
                        {/* 標題 (襯線體) */}
                        <h1 className="text-white font-serif-tc text-2xl font-black mb-1 leading-snug tracking-wide line-clamp-2 flex-shrink-0">
                          {activeCard.title || '請輸入標題'}
                        </h1>
                        
                        {/* 內文 (無襯線體) */}
                        <p className="text-slate-100/90 font-light text-xs leading-relaxed text-left line-clamp-6 flex-shrink-0">
                          {activeCard.content || '請在左側輸入內文...'}
                        </p>
                      </div>
                    </>
                  )}

                  {/* 左下角 Logo 浮水印 (絕對定位) */}
                  <div className="absolute bottom-4 left-4 w-8 h-8 rounded-full overflow-hidden flex items-center justify-center bg-transparent z-30">
                    {logo && <img src={logo} className="w-full h-full object-cover" alt="Watermark" />}
                  </div>

                  {/* Unsplash 圖片來源標記 */}
                  {isUnsplashPhoto(activeCard.imageName) && (
                    <div className="absolute bottom-[22px] left-[56px] bg-black/45 hover:bg-black/60 transition-colors text-white/95 px-2.5 py-1 rounded-full text-[9px] flex items-center gap-1 z-30 select-none">
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" className="opacity-90">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                      </svg>
                      <span>
                        Photo by{' '}
                        <a 
                          href={activeCard.authorLink || 'https://unsplash.com'} 
                          target="_blank" 
                          rel="noopener noreferrer"
                          className="underline hover:text-blue-300 transition-colors"
                          onClick={(e) => e.stopPropagation()}
                        >
                          {activeCard.imageName.replace('Photo by ', '').replace(' on Unsplash', '')}
                        </a>
                        {' '}on{' '}
                        <a 
                          href={activeCard.imageLink || 'https://unsplash.com'} 
                          target="_blank" 
                          rel="noopener noreferrer"
                          className="underline hover:text-blue-300 transition-colors"
                          onClick={(e) => e.stopPropagation()}
                        >
                          Unsplash
                        </a>
                      </span>
                    </div>
                  )}
                </div>
              </div>

              {/* 導出按鈕與進度條 */}
              <div className="w-full mt-6 space-y-4">
                {isGenerating && progress.total > 0 && (
                  <div className="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
                    <div 
                      className="bg-gradient-to-r from-blue-500 to-teal-400 h-2.5 rounded-full transition-all duration-300" 
                      style={{ width: `${(progress.current / progress.total) * 100}%` }}
                    ></div>
                    <p className="text-center text-xs text-slate-400 mt-1.5">
                      正在產生並打包圖片中... ({progress.current} / {progress.total})
                    </p>
                  </div>
                )}

                <div className="grid grid-cols-2 gap-4">
                  <button
                    onClick={handleExportSingle}
                    disabled={isGenerating}
                    className={`btn btn-secondary ${isGenerating ? 'opacity-50 cursor-not-allowed' : ''}`}
                  >
                    <span className="material-symbols-outlined" style={{fontSize: '18px'}}>save</span> 下載目前單張 PNG
                  </button>
                  <button
                    onClick={handleExportAll}
                    disabled={isGenerating}
                    className={`btn btn-primary ${isGenerating ? 'opacity-50 cursor-not-allowed' : ''}`}
                  >
                    <span className="material-symbols-outlined" style={{fontSize: '18px'}}>bolt</span> 一鍵打包全部卡片 (ZIP)
                  </button>
                </div>
              </div>

            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
